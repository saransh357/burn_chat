services:
  - type: web
    name: chaoskey
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn burn_chat:app --workers 2 --bind 0.0.0.0:$PORT --timeout 60
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RELAY_TOKEN
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ADMIN_EMAIL
        value: admin@admin.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: RELAY_URL
        value: ""
      - key: PYTHON_VERSION
        value: 3.11.0
