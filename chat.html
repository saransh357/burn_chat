<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChaosKey BurnChat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-card: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --msg-mine: #0284c7;
            --msg-theirs: #334155;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-main); 
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Auth Screen ── */
        #auth-screen {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }

        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
        .auth-header p { color: var(--text-secondary); font-size: 0.875rem; }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .form-group input { 
            width: 100%; padding: 0.75rem 1rem; background: var(--bg-main); border: 1px solid var(--border); 
            border-radius: 8px; color: white; outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: var(--accent); }

        .btn-primary { 
            width: 100%; padding: 0.75rem; background: var(--accent); color: white; border: none; 
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        /* ── Chat App Layout ── */
        #chat-screen {
            display: none;
            width: 95vw;
            max-width: 1200px;
            height: 85vh;
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .sidebar { width: 300px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg-sidebar); }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item { 
            padding: 1rem 1.5rem; cursor: pointer; display: flex; align-items: center; gap: 12px;
            transition: background 0.2s; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .contact-item:hover { background: rgba(255,255,255,0.05); }
        .contact-item.active { background: rgba(56, 189, 248, 0.1); border-left: 4px solid var(--accent); }

        .avatar { 
            width: 40px; height: 40px; border-radius: 50%; background: var(--border); 
            display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.875rem;
        }

        .chat-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }
        .messages-area { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
        
        /* ── Bubbles ── */
        .msg-wrap { max-width: 70%; display: flex; flex-direction: column; }
        .msg-wrap.mine { align-self: flex-end; }
        .msg-wrap.theirs { align-self: flex-start; }
        
        .bubble { padding: 0.75rem 1rem; border-radius: 12px; font-size: 0.9375rem; line-height: 1.5; }
        .mine .bubble { background: var(--msg-mine); border-bottom-right-radius: 2px; }
        .theirs .bubble { background: var(--msg-theirs); border-bottom-left-radius: 2px; }

        .msg-meta { font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px; display: flex; gap: 8px; }
        .ciphertext-hint { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--accent); opacity: 0.6; cursor: help; }

        /* ── Input Area ── */
        .compose-area { padding: 1.5rem; background: var(--bg-sidebar); border-top: 1px solid var(--border); display: flex; gap: 1rem; }
        .compose-area textarea { 
            flex: 1; background: var(--bg-main); border: 1px solid var(--border); border-radius: 8px; 
            padding: 0.75rem; color: white; resize: none; outline: none; font-family: inherit;
        }

        .logout-btn { background: none; border: none; color: #ef4444; font-size: 0.75rem; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-header">
        <h2>BurnChat</h2>
        <p>End-to-End Encrypted Messaging</p>
    </div>
    <div class="form-group">
        <label>API Base URL</label>
        <input id="base-url" type="text" value="https://your-api.onrender.com">
    </div>
    <div class="form-group">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="name@domain.com">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input id="login-pw" type="password" placeholder="••••••••">
    </div>
    <div id="auth-err" style="color: #f87171; font-size: 0.8rem; margin-bottom: 1rem; display: none;"></div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
</div>

<div id="chat-screen">
    <div class="sidebar">
        <div class="sidebar-header">
            <div>
                <div style="font-weight: 600;" id="sidebar-name">User</div>
                <div style="font-size: 0.7rem; color: var(--accent);" id="sidebar-tier">FREE TIER</div>
            </div>
            <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
        </div>
        <div class="contact-list" id="contact-list"></div>
        <div style="padding: 1rem; border-top: 1px solid var(--border);">
            <input id="new-contact-input" type="text" placeholder="Add email..." style="width: 100%; padding: 0.5rem; background: var(--bg-main); border: 1px solid var(--border); border-radius: 4px; color: white; font-size: 0.8rem;">
            <button class="btn-primary" style="margin-top: 0.5rem; padding: 0.5rem; font-size: 0.8rem;" onclick="addContact()">Add Contact</button>
        </div>
    </div>
    <div class="chat-panel">
        <div id="no-contact-state" style="flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);">
            Select a conversation to start chatting
        </div>
        <div id="active-chat" style="display: none; flex-direction: column; height: 100%;">
            <div style="padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); font-weight: 600;" id="ch-name">Chat</div>
            <div class="messages-area" id="messages-area"></div>
            <div class="compose-area">
                <textarea id="compose-input" placeholder="Type an encrypted message..." rows="1" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
                <button class="btn-primary" style="width: auto; padding: 0 1.5rem;" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    /* Logic remains identical to your original JS to ensure compatibility with app.py */
    let API_BASE = '';
    let apiKey = '';
    let myEmail = '';
    let contacts = [];
    let conversations = {};
    let activeContact = null;

    async function apiFetch(path, opts={}){
        const url = API_BASE.replace(/\/+$/, '') + path;
        const r = await fetch(url, { ...opts, headers: { ...opts.headers, 'Content-Type': 'application/json' } });
        return { ok: r.ok, data: await r.json() };
    }

    async function doLogin(){
        const err = document.getElementById('auth-err');
        API_BASE = document.getElementById('base-url').value.trim();
        const email = document.getElementById('login-email').value.trim();
        const pw = document.getElementById('login-pw').value;

        const {ok, data} = await apiFetch('/v1/login', { method: 'POST', body: JSON.stringify({email, password: pw}) });
        if(!ok) { err.textContent = data.error; err.style.display = 'block'; return; }
        
        myEmail = email;
        document.getElementById('sidebar-name').textContent = data.name;
        document.getElementById('sidebar-tier').textContent = data.tier.toUpperCase() + ' TIER';
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        
        await rotateKeyForSession(email, pw);
    }

    async function rotateKeyForSession(email, pw){
        const {ok, data} = await apiFetch('/v1/rotate_key', { method: 'POST', body: JSON.stringify({email, password: pw}) });
        if(ok) apiKey = data.api_key;
    }

    function addContact(){
        const inp = document.getElementById('new-contact-input');
        const email = inp.value.trim().toLowerCase();
        if(!email || contacts.find(c => c.email === email)) return;
        contacts.push({email});
        conversations[email] = [];
        inp.value = '';
        renderContacts();
    }

    function renderContacts(){
        const list = document.getElementById('contact-list');
        list.innerHTML = contacts.map(c => `
            <div class="contact-item ${activeContact === c.email ? 'active' : ''}" onclick="openConversation('${c.email}')">
                <div class="avatar">${c.email[0].toUpperCase()}</div>
                <div>
                    <div style="font-size: 0.9rem;">${c.email.split('@')[0]}</div>
                    <div style="font-size: 0.7rem; color: var(--text-secondary);">Encrypted Session</div>
                </div>
            </div>
        `).join('');
    }

    function openConversation(email){
        activeContact = email;
        document.getElementById('no-contact-state').style.display = 'none';
        document.getElementById('active-chat').style.display = 'flex';
        document.getElementById('ch-name').textContent = email;
        renderContacts();
        renderMessages();
    }

    // Replace your existing sendMessage and add this polling logic
async function sendMessage() {
    const inp = document.getElementById('compose-input');
    const txt = inp.value.trim();
    if (!txt || !activeContact || !apiKey) return;
    inp.value = '';

    // 1. Encrypt via your app_final_project API
    const {ok, data} = await apiFetch('/v1/encrypt', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + apiKey },
        body: JSON.stringify({ plaintext: txt })
    });

    if (ok) {
        const payload = {
            from: myEmail,
            plaintext: txt,
            ciphertext: data.ciphertext,
            nonce: data.nonce,
            encryption_key: data.encryption_key
        };

        // 2. Send the encrypted bundle to the CHAT database
        await fetch('/api/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                sender: myEmail,
                recipient: activeContact,
                payload: payload
            })
        });
        loadMessages(); // Refresh UI
    }
}

// Automatically check for new messages every 3 seconds
async function loadMessages() {
    if (!activeContact) return;
    
    const r = await fetch(`/api/get_messages?user=${myEmail}&contact=${activeContact}`);
    const rows = await r.json();
    
    // Decrypt messages for display
    const decodedMsgs = await Promise.all(rows.map(async (row) => {
        const p = JSON.parse(row.payload);
        
        // If it's from the other person, we need to decrypt it
        if (p.from !== myEmail) {
            const {ok, data} = await apiFetch('/v1/decrypt', {
                method: 'POST',
                headers: { Authorization: 'Bearer ' + apiKey },
                body: JSON.stringify({
                    ciphertext: p.ciphertext,
                    nonce: p.nonce,
                    encryption_key: p.encryption_key
                })
            });
            return { ...p, plaintext: ok ? data.plaintext : "[Decryption Failed]", ts: row.timestamp };
        }
        return { ...p, ts: row.timestamp };
    }));

    conversations[activeContact] = decodedMsgs;
    renderMessages();
}

// Start the auto-refresh timer
setInterval(loadMessages, 3000);

    function doLogout() { location.reload(); }
</script>
</body>
</html>
